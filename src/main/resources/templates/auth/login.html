<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign In')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-container">
    <h2>Sign In</h2>
    <p style="text-align:center; color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem;">
        Welcome back to Giftify Store
    </p>

    <p class="error" th:if="${param.error}">
        Invalid email or password. Please try again.
    </p>

    <form th:action="@{/auth/login}" method="post">
        <input type="email" name="username" placeholder="Email address" required/>
        <input type="password" name="password" placeholder="Password" required/>
        <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <p>Don't have an account?
        <a th:href="@{/auth/register}">Create one</a>
    </p>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
