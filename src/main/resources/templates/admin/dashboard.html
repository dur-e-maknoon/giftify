<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <header class="page-header">
        <h1>Admin Dashboard</h1>
        <p>Manage Giftify Store catalog and operations</p>
    </header>

    <div class="product-grid">
        <div class="product-card admin-card">
            <div class="product-card-body">
                <h3>Products</h3>
                <p>Manage the full product catalog</p>
                <a th:href="@{/products}">View Products</a>
                <a th:href="@{/products/add}">Add New Product</a>
            </div>
        </div>
        <div class="product-card admin-card">
            <div class="product-card-body">
                <h3>Orders</h3>
                <p>View and manage customer orders</p>
                <a th:href="@{/admin/orders}">View Orders</a>
            </div>
        </div>
        <div class="product-card admin-card">
            <div class="product-card-body">
                <h3>Users</h3>
                <p>Manage registered customers</p>
                <a th:href="@{/admin/users}">View Users</a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
