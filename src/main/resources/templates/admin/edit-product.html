<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Product')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-container" style="max-width: 650px;">
    <h2>Edit Product</h2>

    <form th:action="@{/products/edit/{id}(id=${product.id})}"
          method="post"
          enctype="multipart/form-data">

        <input type="text" name="name" th:value="${product.name}" placeholder="Product Name" required/>
        <input type="text" name="brand" th:value="${product.brand}" placeholder="Brand" required/>
        <input type="number" name="price" th:value="${product.price}" placeholder="Price" step="0.01" required/>
        <input type="number" name="stockQuantity" th:value="${product.stockQuantity}" placeholder="Stock Quantity"/>

        <div th:if="${product.imageUrl != null}" style="margin: 0.5rem 0 1rem;">
            <p style="color:var(--text-muted); font-size:0.8rem; margin-bottom:0.5rem;">Current image</p>
            <img th:src="${product.imageUrl}"
                 alt="Current product"
                 style="width:100px; height:100px; object-fit:cover; border-radius:6px; border:1px solid var(--border);"/>
        </div>

        <input type="file" name="imageFile" accept="image/*"/>

        <select name="mainCategory">
            <option value="">Select Main Category</option>
            <option value="PERFUME" th:selected="${product.mainCategory == 'PERFUME'}">Perfume</option>
            <option value="GIFTSET" th:selected="${product.mainCategory == 'GIFTSET'}">Gift Set</option>
            <option value="ACCESSORY" th:selected="${product.mainCategory == 'ACCESSORY'}">Accessory</option>
            <option value="BODYLOTION" th:selected="${product.mainCategory == 'BODYLOTION'}">Body Lotion</option>
            <option value="TESTER" th:selected="${product.mainCategory == 'TESTER'}">Tester</option>
        </select>

        <select name="mood">
            <option value="">Select Mood</option>
            <option value="DECENT" th:selected="${product.mood == 'DECENT'}">Decent</option>
            <option value="LOVE" th:selected="${product.mood == 'LOVE'}">Love</option>
            <option value="OBSESSION" th:selected="${product.mood == 'OBSESSION'}">Obsession</option>
            <option value="BEAUTY" th:selected="${product.mood == 'BEAUTY'}">Beauty</option>
        </select>

        <select name="gender">
            <option value="">Select Gender</option>
            <option value="WOMEN" th:selected="${product.gender == 'WOMEN'}">Women</option>
            <option value="MEN" th:selected="${product.gender == 'MEN'}">Men</option>
            <option value="UNISEX" th:selected="${product.gender == 'UNISEX'}">Unisex</option>
        </select>

        <select name="season">
            <option value="">Select Season</option>
            <option value="All seasons" th:selected="${product.season == 'All seasons'}">All Seasons</option>
            <option value="Spring/Summer" th:selected="${product.season == 'Spring/Summer'}">Spring / Summer</option>
            <option value="Fall/Winter" th:selected="${product.season == 'Fall/Winter'}">Fall / Winter</option>
            <option value="Summer" th:selected="${product.season == 'Summer'}">Summer</option>
            <option value="Winter" th:selected="${product.season == 'Winter'}">Winter</option>
        </select>

        <select name="longevity">
            <option value="">Select Longevity</option>
            <option value="2-4 hours" th:selected="${product.longevity == '2-4 hours'}">2–4 hours</option>
            <option value="4-6 hours" th:selected="${product.longevity == '4-6 hours'}">4–6 hours</option>
            <option value="6-8 hours" th:selected="${product.longevity == '6-8 hours'}">6–8 hours</option>
            <option value="8-10 hours" th:selected="${product.longevity == '8-10 hours'}">8–10 hours</option>
            <option value="10+ hours" th:selected="${product.longevity == '10+ hours'}">10+ hours</option>
        </select>

        <input type="text" name="notes" th:value="${product.notes}" placeholder="Notes"/>
        <input type="text" name="bestFor" th:value="${product.bestFor}" placeholder="Best For"/>
        <input type="text" name="vibe" th:value="${product.vibe}" placeholder="Vibe"/>
        <textarea name="description" placeholder="Product Description" rows="4" th:text="${product.description}"></textarea>

        <button type="submit" class="btn-primary">Save Changes</button>
    </form>

    <p><a th:href="@{/products}">Back to Products</a></p>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
