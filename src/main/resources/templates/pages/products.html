<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Giftify - All Perfumes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a th:href="@{/}"> Giftify</a>
    <a th:href="@{/products}">All</a>
    <a th:href="@{/products/category/WOMEN}">Women</a>
    <a th:href="@{/products/category/MEN}">Men</a>
    <a th:href="@{/products/type/PERFUME}">Perfumes</a>
    <a th:href="@{/products/type/GIFTSET}">Gift Sets</a>
    <a th:href="@{/products/type/ACCESSORY}">Accessories</a>
    <a th:href="@{/products/type/BODYLOTION}">Body Lotions</a>
    <a th:href="@{/products/mood/DECENT}">Decent</a>
    <a th:href="@{/products/mood/LOVE}">Love</a>
    <a th:href="@{/products/mood/OBSESSION}">Obsession</a>
    <a th:href="@{/products/mood/BEAUTY}">Beauty</a>
    <a th:href="@{/cart}">Cart</a>
    <a th:href="@{/products/add}" sec:authorize="hasRole('ADMIN')">+ Add</a>
    <a th:href="@{/auth/logout}">Logout</a>
</nav>

<!-- SEARCH BAR -->
<div class="search-bar">
    <form th:action="@{/products/search}" method="get">
        <input type="text"
               name="keyword"
               th:value="${keyword}"
               placeholder="Search perfumes, brands..."/>
        <button type="submit"> Search</button>
    </form>
</div>

<div class="container">
    <h1 th:text="${title != null ? title : 'All Perfumes'}">Our Perfumes</h1>

    <div class="product-grid">
        <div class="product-card" th:each="product : ${products}">
            <img th:src="${product.imageUrl}"
                 alt="Product Image"
                 onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'"/>

            <p th:text="${product.gender}">Gender</p>
            <h3 th:text="${product.name}">Product Name</h3>
            <p th:text="${product.brand}">Brand</p>
            <span class="mood-badge" th:text="${product.mood}">Mood</span>
            <p th:text="'$' + ${product.price}">Price</p>

            <div class="card-buttons">
                <a th:href="@{/products/{id}(id=${product.id})}">View</a>
                <a th:href="@{/cart/add/{id}(id=${product.id})}"
                   class="cart-btn">🛒 Add</a>
                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                   sec:authorize="hasRole('ADMIN')"
                   class="edit-btn">Edit</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                   onclick="return confirm('Delete this product?')"
                   class="delete-btn"
                   sec:authorize="hasRole('ADMIN')">Delete</a>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2024 Giftify. All rights reserved.</p>
</footer>

</body>
</html>
