<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${title != null ? title : 'Shop'})}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <header class="page-header">
        <h1 th:text="${title != null ? title : 'All Products'}">All Products</h1>
        <p>Explore our full collection at Giftify Store</p>
    </header>

    <div class="product-grid" th:if="${!products.isEmpty()}">
        <article class="product-card" th:each="product : ${products}">
            <a th:href="@{/products/{id}(id=${product.id})}" class="product-card-media product-card-media--light">
                <img th:src="${product.imageUrl}"
                     th:alt="${product.name}"
                     class="product-img-crisp"
                     onerror="this.src='https://via.placeholder.com/400x400?text=Giftify'"/>
            </a>
            <div class="product-card-body">
                <p class="product-card-meta" th:text="${product.gender}">Category</p>
                <h3 th:text="${product.name}">Product Name</h3>
                <p class="brand" th:text="${product.brand}">Brand</p>
                <span class="mood-badge" th:if="${product.mood != null}" th:text="${product.mood}">Mood</span>
                <p class="price" th:text="'$' + ${product.price}">Price</p>
                <div class="card-buttons">
                    <a th:href="@{/products/{id}(id=${product.id})}">View</a>
                    <a th:href="@{/cart/add/{id}(id=${product.id})}"
                       class="cart-btn"
                       sec:authorize="isAuthenticated()">Add to Cart</a>
                    <a th:href="@{/auth/login}"
                       class="cart-btn"
                       sec:authorize="!isAuthenticated()">Sign In to Buy</a>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}"
                       class="edit-btn"
                       sec:authorize="hasRole('ADMIN')">Edit</a>
                    <a th:href="@{/products/delete/{id}(id=${product.id})}"
                       onclick="return confirm('Delete this product?')"
                       class="delete-btn"
                       sec:authorize="hasRole('ADMIN')">Delete</a>
                </div>
            </div>
        </article>
    </div>

    <div class="empty-state" th:if="${products.isEmpty()}">
        <p>No products found in this category.</p>
        <a th:href="@{/products}" class="btn-primary">Browse All Products</a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
