<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${product.name})}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="product-detail">
        <div class="product-detail-gallery product-detail-gallery--light">
            <img th:src="${product.imageUrl}"
                 th:alt="${product.name}"
                 class="product-img-crisp"
                 onerror="this.src='https://via.placeholder.com/400x500?text=Giftify'"/>
        </div>

        <div class="product-info">
            <p class="brand-line" th:text="${product.brand}">Brand</p>
            <h1 th:text="${product.name}">Product Name</h1>
            <p class="price" th:text="'$' + ${product.price}">Price</p>

            <hr/>

            <div class="detail-row" th:if="${product.gender != null}">
                <span class="label">Category</span>
                <span th:text="${product.gender}"></span>
            </div>
            <div class="detail-row" th:if="${product.mood != null}">
                <span class="label">Mood</span>
                <span th:text="${product.mood}"></span>
            </div>
            <div class="detail-row" th:if="${product.season != null}">
                <span class="label">Season</span>
                <span th:text="${product.season}"></span>
            </div>
            <div class="detail-row" th:if="${product.longevity != null}">
                <span class="label">Longevity</span>
                <span th:text="${product.longevity}"></span>
            </div>
            <div class="detail-row" th:if="${product.notes != null}">
                <span class="label">Notes</span>
                <span th:text="${product.notes}"></span>
            </div>
            <div class="detail-row" th:if="${product.bestFor != null}">
                <span class="label">Best For</span>
                <span th:text="${product.bestFor}"></span>
            </div>
            <div class="detail-row" th:if="${product.vibe != null}">
                <span class="label">Vibe</span>
                <span th:text="${product.vibe}"></span>
            </div>
            <div class="detail-row" th:if="${product.stockQuantity != null}">
                <span class="label">In Stock</span>
                <span th:text="${product.stockQuantity}"></span>
            </div>

            <hr/>

            <p class="product-description" th:text="${product.description}">Description</p>

            <div class="detail-actions">
                <a th:href="@{/cart/add/{id}(id=${product.id})}"
                   class="btn-primary"
                   sec:authorize="isAuthenticated()">Add to Cart</a>
                <a th:href="@{/auth/login}"
                   class="btn-primary"
                   sec:authorize="!isAuthenticated()">Sign In to Purchase</a>
                <a th:href="@{/products}" class="btn-secondary back-btn">Back to Shop</a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
