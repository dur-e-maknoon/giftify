<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cart')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <header class="page-header">
        <h1>Shopping Cart</h1>
        <p>Review your selections before checkout</p>
    </header>

    <div th:if="${cart.items.empty}" class="empty-state">
        <p>Your cart is empty.</p>
        <a th:href="@{/products}" class="btn-primary">Continue Shopping</a>
    </div>

    <div th:if="${!cart.items.empty}">
        <div class="cart-item" th:each="item : ${cart.items}"
             th:if="${item != null and item.product != null}">
            <img th:src="${item.product.imageUrl}"
                 th:alt="${item.product.name}"
                 onerror="this.src='https://via.placeholder.com/80x80?text=Giftify'"/>
            <div class="cart-item-info">
                <h3 th:text="${item.product.name}">Name</h3>
                <p th:text="${item.product.brand}">Brand</p>
                <p th:text="'$' + ${item.product.price} + ' x ' + ${item.quantity}">Price</p>
            </div>
            <div class="cart-item-total">
                <p th:text="'$' + ${item.totalPrice}">Total</p>
                <a th:href="@{/cart/remove/{id}(id=${item.id})}" class="delete-btn">Remove</a>
            </div>
        </div>

        <div class="cart-total">
            <h2 th:text="'Total: $' + ${total}">Total</h2>
            <a th:href="@{/orders/checkout}" class="btn-primary">Proceed to Checkout</a>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
